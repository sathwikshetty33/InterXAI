{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Speech-to-Text</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        .main-container {
            width: 95%;
            max-width: 1400px;
            display: flex;
            gap: 40px;
            align-items: stretch;
            justify-content: space-between;
            padding: 20px;
        }

        .spline-viewer-container {
            flex: 1;
            height: 700px;
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            flex: 1;
            max-width: 45%;
            background-color: #1e1e1e;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 700px;
        }

        .chat-header {
            padding: 15px;
            background-color: #006400;
            color: #ffffff;
            text-align: center;
            font-size: 1.4em;
            font-weight: 500;
        }

        .chat-messages {
            padding: 20px;
            max-height: 550px;
            overflow-y: auto;
            background-color: #2e2e2e;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: #00cc00 #2e2e2e;
        }

        .chat-footer {
            padding: 15px;
            background-color: #1e1e1e;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }

        #response-input {
            width: 100%;
            padding: 12px 48px 12px 18px; /* Adjusted padding-right for mic icon */
            border: 1px solid #555;
            border-radius: 24px;
            font-size: 1em;
            outline: none;
            background-color: #2e2e2e;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        #response-input:focus {
            border-color: #00cc00;
            box-shadow: 0 0 5px rgba(0, 204, 0, 0.5);
        }

        #mic-button {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            background-color: transparent;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 1.4em; /* Adjust the size of the icons */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        #mic-button:hover {
            color: #00cc00;
        }

        #mic-icon,
        #recording-icon {
            transition: opacity 0.3s ease;
        }

        #recording-icon {
            display: none; /* Hide the recording icon by default */
        }

        .chat-footer button {
            padding: 12px 18px;
            background-color: #00cc00;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        .chat-footer button:hover {
            background-color: #009900;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="spline-viewer-container">
        <spline-viewer url="https://prod.spline.design/oYiuUSnOHJTzdcPg/scene.splinecode"></spline-viewer>
    </div>
    <div class="chat-container">
        <div class="chat-header">
            Conversation with InterXAI
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Chat messages will go here -->
        </div>
        <div class="chat-footer">
            <form method="POST" class="input-container">
                {% csrf_token %}
                <div class="input-wrapper">
                    <input id="response-input" type="text" name="response" placeholder="Type your response..." required>
                    <div id="mic-button" class="mic-button">
                        <span id="mic-icon" class="material-symbols-outlined">mic</span>
                        <span id="recording-icon" class="material-symbols-outlined">radio_button_checked</span>
                    </div>
                </div>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
</div>

<script>
    const micButton = document.getElementById('mic-button');
    const responseInput = document.getElementById('response-input');
    const micIcon = document.getElementById('mic-icon');
    const recordingIcon = document.getElementById('recording-icon');

    // Speech-to-Text (Web Speech API)
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        micButton.addEventListener('click', () => {
            if (micButton.classList.contains('recording')) {
                recognition.stop();
            } else {
                recognition.start();
            }
            micButton.classList.toggle('recording');
            toggleMicIcon();
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            responseInput.value = transcript;
            micButton.classList.remove('recording');
            toggleMicIcon();
        };

        recognition.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            micButton.classList.remove('recording');
            toggleMicIcon();
        };

        recognition.onend = () => {
            micButton.classList.remove('recording');
            toggleMicIcon();
        };

        const toggleMicIcon = () => {
            if (micButton.classList.contains('recording')) {
                micIcon.style.display = 'none';
                recordingIcon.style.display = 'block';
            } else {
                micIcon.style.display = 'block';
                recordingIcon.style.display = 'none';
            }
        };
    } else {
        console.warn('Speech Recognition API not supported in this browser.');
    }
</script>
</body>
</html>
