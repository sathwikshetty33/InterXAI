{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Speech-to-Text and Text-to-Speech</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=mic" />
    <style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        .main-container {
            width: 95%;
            max-width: 1400px;
            display: flex;
            gap: 40px;
            align-items: stretch;
            justify-content: space-between;
            padding: 20px;
        }

        .spline-viewer-container {
            flex: 1;
            height: 700px;
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            flex: 1;
            max-width: 45%;
            background-color: #1e1e1e;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 700px;
        }

        .chat-header {
            padding: 15px;
            background-color: #006400;
            color: #ffffff;
            text-align: center;
            font-size: 1.4em;
            font-weight: 500;
        }

        .chat-messages {
            padding: 20px;
            max-height: 550px;
            overflow-y: auto;
            background-color: #2e2e2e;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: #00cc00 #2e2e2e;
        }

        .chat-footer {
            padding: 15px;
            background-color: #1e1e1e;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-container {
            display: flex;
            flex: 1;
            align-items: center;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        #response-input {
            width: 100%;
            padding: 12px 48px 12px 18px; /* Room for the mic icon */
            border: 1px solid #555;
            border-radius: 24px;
            font-size: 1em;
            outline: none;
            background-color: #2e2e2e;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        #response-input:focus {
            border-color: #00cc00;
            box-shadow: 0 0 5px rgba(0, 204, 0, 0.5);
        }

        #mic-button {
            position: absolute;
            right: 10px;
            color: #ffffff;
            cursor: pointer;
            font-size: 1.5em;
            transition: color 0.3s ease;
        }

        #mic-button:hover {
            color: #00cc00;
        }

        .send-button {
            padding: 12px 18px;
            background-color: #00cc00;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        .send-button:hover {
            background-color: #009900;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="spline-viewer-container">
        <spline-viewer url="https://prod.spline.design/oYiuUSnOHJTzdcPg/scene.splinecode"></spline-viewer>
    </div>
    <div class="chat-container">
        <div class="chat-header">
            Conversation for {{ convo.post.post }} with InterXAI
        </div>
        <div class="chat-messages" id="chat-messages">
            {% for question in questions %}
            <div class="message {% if question.user == 'user' %}user{% else %}ai{% endif %}">
                <div class="content" data-speak="{{ question.question }}">
                    {{ question.question }}
                </div>
                <div class="time">
                    {{ question.created_at|date:"D, d M Y H:i" }}
                </div>
            </div>
            {% endfor %}
        </div>
        <div class="chat-footer">
            <form method="POST" class="input-container">
                {% csrf_token %}
                <div class="input-wrapper">
                    <input id="response-input" type="text" name="response" placeholder="Type your response..." required>
                    <span id="mic-button" class="material-symbols-outlined">mic</span>
                </div>
                <button type="submit" class="send-button">Send</button>
            </form>
        </div>
    </div>
</div>

<script>
    const micButton = document.getElementById('mic-button');
    const responseInput = document.getElementById('response-input');

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        micButton.addEventListener('click', () => {
            if (micButton.classList.contains('recording')) {
                recognition.stop();
            } else {
                recognition.start();
            }
            micButton.classList.toggle('recording');
            micButton.textContent = micButton.classList.contains('recording') ? 'radio_button_checked' : 'mic';
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            responseInput.value = transcript;
            micButton.classList.remove('recording');
            micButton.textContent = 'mic';
        };

        recognition.onerror = () => {
            micButton.classList.remove('recording');
            micButton.textContent = 'mic';
        };

        recognition.onend = () => {
            micButton.classList.remove('recording');
            micButton.textContent = 'mic';
        };
    } else {
        console.warn('Speech Recognition API not supported in this browser.');
    }
</script>
</body>
</html>
