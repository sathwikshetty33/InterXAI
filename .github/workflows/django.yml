name: PR Analysis
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  analyze-pr:
    runs-on: ubuntu-latest
    
    steps:
    - name: Start Redis
      run: |
        docker run -d --name redis -p 6380:6380 redis:latest redis-server --port 6380
        echo "Waiting for Redis to start..."
        sleep 10
        docker exec redis redis-cli -p 6380 ping
    
    - name: Start CodeLint service
      run: |
        docker run -d --name codelint \
          -p 8000:8000 \
          -e CELERY_BROKER_URL=redis://172.17.0.1:6380/0 \
          -e CELERY_RESULT_BACKEND=redis://172.17.0.1:6380/0 \
          -e DEBUG=true \
          -e ALLOWED_HOSTS="*" \
          sathwikshetty50/codelintpr
        
        echo "Waiting for CodeLint service to start..."
        sleep 30
        
        # Wait for service to be ready
        for i in {1..20}; do
          if curl -f http://localhost:8000 >/dev/null 2>&1; then
            echo "CodeLint service is ready"
            break
          fi
          echo "Attempt $i: waiting for CodeLint service..."
          sleep 5
        done
    
    - name: Check services status
      run: |
        echo "=== Docker containers ==="
        docker ps
        echo "=== Redis test ==="
        docker exec redis redis-cli -p 6380 ping
        echo "=== CodeLint service test ==="
        curl -v http://localhost:8000 || echo "Service not responding"
    
    - name: Analyze PR for Bugs
      run: |
        curl -X POST "http://localhost:8000/github-actions-analyze-pr/" \
          -H "Content-Type: application/json" \
          -d "{
            \"repo_url\": \"${{ github.repository }}\",
            \"pr_num\": \"${{ github.event.pull_request.number }}\",
            \"github_token\": \"${{ secrets.GITHUBSSS_TOKEN }}\",
            \"email\": \"${{ secrets.NOTIFICATION_EMAIL }}\"
          }" \
          -v
    
    - name: Show logs on failure
      if: failure()
      run: |
        echo "=== Redis logs ==="
        docker logs redis
        echo "=== CodeLint logs ==="
        docker logs codelint
    
    - name: Clean up
      if: always()
      run: |
        docker stop redis codelint || true
        docker rm redis codelint || true
      
    - name: Comment on PR (Optional)
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          try {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 PR analysis has been triggered. Results will be sent via email to the configured address.'
            });
          } catch (error) {
            console.log('Failed to comment on PR:', error.message);
          }
