name: PR Analysis
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  analyze-pr:
    runs-on: ubuntu-latest
    
    services:
      codelint:
        image: sathwikshetty50/codelintpr
        ports:
          - 8000:8000
    
    steps:
    - name: Wait for service to be ready
      run: |
        echo "Waiting for CodeLint service to be ready..."
        sleep 30
        echo "Service should be ready now"
    
    - name: Analyze PR for Bugs
      run: |
        curl -X POST "http://localhost:8000/github-actions-analyze-pr/" \
          -H "Content-Type: application/json" \
          -d "{
            \"repo_url\": \"${{ github.repository }}\",
            \"pr_num\": \"${{ github.event.pull_request.number }}\",
            \"github_token\": \"${{ secrets.GITHUB_TOKEN }}\",
            \"email\": \"${{ secrets.NOTIFICATION_EMAIL }}\"
          }" \
          -v
      
    - name: Comment on PR (Optional)
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          try {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 PR analysis has been triggered. Results will be sent via email to the configured address.'
            });
          } catch (error) {
            console.log('Failed to comment on PR:', error.message);
          }
