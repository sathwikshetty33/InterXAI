name: PR Analysis
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyze-pr:
    runs-on: ubuntu-latest
    
    services:
      codelint:
        image: sathwikshetty50/codelintpr
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/health || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
    
    steps:
    - name: Wait for service to be ready
      run: |
        echo "Waiting for CodeLint service to be ready..."
        timeout 60s bash -c 'until curl -f http://localhost:8000/health; do sleep 5; done' || echo "Service may not be ready"
    
    - name: Analyze PR for Bugs
      run: |
        curl -X POST "http://localhost:8000/github-actions-analyze-pr/" \
          -H "Content-Type: application/json" \
          -d '{
            "repo_url": "${{ github.repository }}",
            "pr_num": "${{ github.event.pull_request.number }}",
            "github_token": "${{ secrets.GITHUB_TOKEN }}",
            "email": "${{ secrets.NOTIFICATION_EMAIL }}"
          }'
      
    - name: Comment on PR (Optional)
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🔍 PR analysis has been triggered. Results will be sent via email to the configured address.'
          })
