name: PR Analysis
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  analyze-pr:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:latest
        ports:
          - 6380:6380
        options: >-
          --health-cmd "redis-cli -p 6380 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          redis-server --port 6380
      
      codelint:
        image: sathwikshetty50/codelintpr
        ports:
          - 8000:8000
        env:
          CELERY_BROKER_URL: redis://localhost:6380/0
          CELERY_RESULT_BACKEND: redis://localhost:6380/0
          DEBUG: true
          ALLOWED_HOSTS: "*"
        options: >-
          --health-cmd "curl -f http://localhost:8000/health || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
    
    steps:
    - name: Wait for services to be ready
      run: |
        echo "Waiting for Redis and CodeLint services to be ready..."
        # Wait for Redis
        timeout 60 bash -c 'until printf "" 2>>/dev/null >>/dev/tcp/localhost/6380; do sleep 1; done'
        echo "Redis is ready"
        
        # Wait for CodeLint service
        timeout 120 bash -c 'until curl -f http://localhost:8000/health 2>/dev/null; do sleep 2; done' || echo "Health check failed, continuing..."
        sleep 10
        echo "Services should be ready now"
    
    - name: Analyze PR for Bugs
      run: |
        curl -X POST "http://localhost:8000/github-actions-analyze-pr/" \
          -H "Content-Type: application/json" \
          -d "{
            \"repo_url\": \"${{ github.repository }}\",
            \"pr_num\": \"${{ github.event.pull_request.number }}\",
            \"github_token\": \"${{ secrets.GITHUBSSS_TOKEN }}\",
            \"email\": \"${{ secrets.NOTIFICATION_EMAIL }}\"
          }" \
          -v
      
    - name: Debug - Check service logs
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          console.log('Service container logs will be available in the GitHub Actions logs above');
      
    - name: Comment on PR (Optional)
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          try {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 PR analysis has been triggered. Results will be sent via email to the configured address.'
            });
          } catch (error) {
            console.log('Failed to comment on PR:', error.message);
          }
