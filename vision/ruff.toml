# Ruff configuration for the InterXAI vision service.

target-version = "py312"
line-length = 100

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.pyc",
    "models",
]

[lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "SIM", "ARG", "PTH"]
ignore = [
    "E501",  # Line too long (handled by line-length)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["app"]
combine-as-imports = true

[lint.pyupgrade]
keep-runtime-typing = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
