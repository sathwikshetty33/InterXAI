[mypy]

python_version = 3.12

# Type checking strictness
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
# MediaPipe/PIL interop yields untyped base classes; don't fail on subclassing them.
disallow_subclassing_any = false

warn_unused_configs = true
no_implicit_optional = true

pretty = true
show_error_codes = true
show_column_numbers = true

# mediapipe (and some others) ship no stubs — treat their symbols as Any.
ignore_missing_imports = true

exclude = ^\.venv/|^models/

# pydantic BaseSettings/BaseModel trip "has type Any" misc errors under strict.
disable_error_code = misc
